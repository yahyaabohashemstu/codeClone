# Alembic configuration for Clone Lens (core schema).
#
# The database URL is resolved at runtime in migrations/env.py from the
# DATABASE_URL environment variable (falling back to the instance SQLite DB),
# so it is intentionally left blank here.
#
# Enterprise tables (enterprise_*) are managed separately by EnterpriseStorage
# and are excluded from these migrations (see migrations/env.py include_object).

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
