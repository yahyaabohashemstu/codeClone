name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # 1. Backend tests -- Python 3.11, pytest with coverage
  # ===========================================================================
  backend-test:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.11-

      # The CI tests exercise the real UniXcoder model; cache the HuggingFace
      # download (~500 MB) so it is not re-fetched every run (the pip cache
      # above does not cover model files).
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-unixcoder-base-v1
          restore-keys: |
            hf-models-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        env:
          FLASK_ENV: testing
        run: |
          pytest tests/ \
            --cov=backend \
            --cov=enterprise_platform \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=45 \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          retention-days: 14

  # ===========================================================================
  # 2. Frontend build -- Node 20, lint, typecheck, build
  # ===========================================================================
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: code-sleuth-react-ui

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Cache the npm download cache, NOT node_modules: `npm ci` deletes
      # node_modules at install start, so caching it provided zero speedup.
      - name: Cache npm download cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-node20-${{ hashFiles('code-sleuth-react-ui/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-node20-

      - name: Install dependencies
        run: npm ci

      - name: Lint (allow failure)
        continue-on-error: true
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Unit tests (Vitest)
        run: npm run test

      - name: Build production bundle
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: code-sleuth-react-ui/dist
          retention-days: 7

  # ===========================================================================
  # 3. Security audit -- dependency vulnerabilities + Python SAST
  # ===========================================================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install audit tools
        run: pip install pip-audit==2.7.3 bandit==1.8.0

      # Non-blocking: advisories need human triage, but surface them in the log.
      - name: Python dependency audit (pip-audit)
        continue-on-error: true
        run: pip-audit -r requirements.txt

      - name: Python SAST (bandit)
        continue-on-error: true
        run: bandit -r backend enterprise_platform -ll -x tests

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: npm dependency audit
        continue-on-error: true
        working-directory: code-sleuth-react-ui
        run: npm audit --omit=dev || true

  # ===========================================================================
  # 4. Docker build -- Build images after tests and frontend pass
  # ===========================================================================
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-build]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The root Dockerfile is the ACTUAL production/deploy artifact (single
      # container, same-origin). Build it here so a break in the deployed image
      # surfaces in CI, not at release time.
      - name: Build production single-container image (root Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          tags: codeclone:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Validate the deploy compose topologies so a malformed service/reference
      # is caught in CI rather than on the Coolify host at deploy time.
      - name: Validate deploy compose files
        run: |
          export APP_IMAGE=ghcr.io/example/codeclone SECRET_KEY=x ENTERPRISE_DATA_KEY=x \
                 DATABASE_URL=sqlite:///x REDIS_URL=redis://x POSTGRES_PASSWORD=x
          docker compose -f docker-compose.coolify.yml config -q
          docker compose -f docker/docker-compose.prod.yml config -q

      - name: Build backend image (multi-container prod stack)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: false
          tags: codeclone-backend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (multi-container prod stack)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: false
          tags: codeclone-frontend:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
