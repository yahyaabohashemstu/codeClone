name: Production Deploy

# Continuous delivery for CodeClone, single-container topology:
#   test (GitHub) → build ONE image (root Dockerfile) → push to GHCR →
#   trigger Coolify, which pulls the image and deploys behind Traefik.
#
# The heavy torch/transformers build runs on GitHub's runners, never on the
# Hetzner host. Database migrations run on the Hetzner side via the one-shot
# `migrate` service in docker-compose.coolify.yml (the CI runner cannot reach a
# Coolify-internal database), so there is deliberately no alembic step here.
#
# Required (configure under the `production` GitHub Environment):
#   COOLIFY_WEBHOOK_URL   Coolify deploy webhook for the application
#   COOLIFY_TOKEN         Bearer token for that webhook
# GHCR push uses the built-in GITHUB_TOKEN.

on:
  push:
    branches:
      - "release/**"
    tags:
      - "v*.*.*"
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ===========================================================================
  # 1. Quality gate — the image is not built unless tests pass
  # ===========================================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.11-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-graphcodebert-base-v1

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Backend test suite (AST · SSRF · tenancy · auth)
        env:
          FLASK_ENV: testing
        run: pytest tests/ -q

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code-sleuth-react-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: code-sleuth-react-ui
        run: npm ci

      - name: Type check
        working-directory: code-sleuth-react-ui
        run: npx tsc --noEmit

      - name: Frontend unit tests
        working-directory: code-sleuth-react-ui
        run: npm run test

  # ===========================================================================
  # 2. Build the single-container image (root Dockerfile) and push to GHCR
  # ===========================================================================
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute lowercase image tags
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          SHA_TAG="sha-${GITHUB_SHA::12}"
          TAGS="${IMAGE}:latest"$'\n'"${IMAGE}:${SHA_TAG}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:${GITHUB_REF_NAME}"
          fi
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
            echo "image_ref=${IMAGE}:${SHA_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push single-container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # 3. Deploy — tell Coolify to pull the new image and roll it out via Traefik.
  #    Migrations run on the Hetzner side (compose `migrate` service).
  # ===========================================================================
  deploy:
    name: Trigger Coolify Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Trigger Coolify webhook
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK_URL" ] || [ -z "$COOLIFY_TOKEN" ]; then
            echo "::error::COOLIFY_WEBHOOK_URL / COOLIFY_TOKEN are not configured in the production environment."
            exit 1
          fi
          curl --fail --show-error --silent -X POST \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            "${COOLIFY_WEBHOOK_URL}"

      - name: Summary
        run: |
          echo "### Deployed to production :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ needs.build-and-push.outputs.image_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Migrations: applied on the host by the compose \`migrate\` service" >> "$GITHUB_STEP_SUMMARY"
