name: Production Deploy

# Continuous delivery for CodeClone, single-container topology, tuned for a
# PRIVATE repo's monthly GitHub Actions minute budget:
#
#   * Every push to release/** runs ONLY the lightweight quality gate
#     (lint · typecheck · tests · frontend build) — no image build.
#   * The expensive image build (torch/transformers, multi-GB) and the deploy
#     run ONLY when you actually cut a release: a `v*.*.*` tag or a manual
#     workflow_dispatch. This keeps the minute-hungry Docker build off every
#     everyday push.
#
# Flow on a release cut: test → build ONE image (root Dockerfile) → push to
# GHCR → trigger Coolify, which pulls the image and deploys behind Traefik.
# Migrations run host-side via the compose `migrate` service (a CI runner cannot
# reach a Coolify-internal DB), so there is deliberately no alembic step here.
#
# Required (configure under the `production` GitHub Environment):
#   COOLIFY_WEBHOOK_URL   Coolify deploy webhook for the application
#   COOLIFY_TOKEN         Bearer token for that webhook
# GHCR push uses the built-in GITHUB_TOKEN.

on:
  push:
    branches:
      - "release/**"
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Ref-scoped concurrency: superseded runs on the same branch cancel each other
# (saves minutes on rapid pushes); each unique tag runs on its own.
concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  # ===========================================================================
  # 1. Quality gate — runs on every trigger. Cheap: no Docker build here.
  # ===========================================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.11-

      # Cache the GraphCodeBERT download (~500 MB) so the minute-heavy fetch
      # happens once, not on every run.
      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-graphcodebert-base-v1

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Backend test suite (AST · SSRF · tenancy · auth)
        env:
          FLASK_ENV: testing
        run: pytest tests/ -q

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: code-sleuth-react-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: code-sleuth-react-ui
        run: npm ci

      - name: Type check
        working-directory: code-sleuth-react-ui
        run: npx tsc --noEmit

      - name: Frontend unit tests
        working-directory: code-sleuth-react-ui
        run: npm run test

      # Fast (~seconds) — catches build breaks on every push without paying for
      # the full Docker image build.
      - name: Frontend production build
        working-directory: code-sleuth-react-ui
        run: npm run build

  # ===========================================================================
  # 2. Build the single-container image (root Dockerfile) and push to GHCR.
  #    RELEASE-ONLY: tags v*.*.* or a manual dispatch — not every branch push.
  # ===========================================================================
  build-and-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    needs: test
    if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
    outputs:
      image_ref: ${{ steps.meta.outputs.image_ref }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute lowercase image tags
        id: meta
        run: |
          IMAGE="ghcr.io/${GITHUB_REPOSITORY,,}"
          SHA_TAG="sha-${GITHUB_SHA::12}"
          TAGS="${IMAGE}:latest"$'\n'"${IMAGE}:${SHA_TAG}"
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAGS="${TAGS}"$'\n'"${IMAGE}:${GITHUB_REF_NAME}"
          fi
          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
            echo "image_ref=${IMAGE}:${SHA_TAG}"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push single-container image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # 3. Deploy — tell Coolify to pull the new image and roll it out via Traefik.
  #    RELEASE-ONLY. Migrations run host-side (compose `migrate` service).
  # ===========================================================================
  deploy:
    name: Trigger Coolify Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    if: ${{ github.ref_type == 'tag' || github.event_name == 'workflow_dispatch' }}
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Trigger Coolify webhook
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK_URL" ] || [ -z "$COOLIFY_TOKEN" ]; then
            echo "::error::COOLIFY_WEBHOOK_URL / COOLIFY_TOKEN are not configured in the production environment."
            exit 1
          fi
          curl --fail --show-error --silent -X POST \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            "${COOLIFY_WEBHOOK_URL}"

      - name: Summary
        run: |
          echo "### Deployed to production :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ needs.build-and-push.outputs.image_ref }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Migrations: applied on the host by the compose \`migrate\` service" >> "$GITHUB_STEP_SUMMARY"
