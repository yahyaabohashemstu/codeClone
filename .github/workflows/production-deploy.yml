name: Production Deploy

# Continuous deployment for tagged releases. Push a semver tag (e.g. v1.0.0) or
# run manually. Branch/PR testing is handled by ci.yml; this pipeline promotes a
# verified build to production.
#
# The `deploy` job runs in the protected `production` GitHub Environment, so it
# only executes once its required reviewers/secrets are configured — a tag push
# never deploys silently. Required secrets (configure under the `production`
# environment):
#   DATABASE_URL          SQLAlchemy URL of the production database (for migrations)
#   COOLIFY_WEBHOOK_URL   Deploy webhook for the production host (Coolify/PaaS)
#   COOLIFY_TOKEN         Bearer token for the deploy webhook
# GHCR push uses the built-in GITHUB_TOKEN (no extra secret needed).

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref (tag/branch/SHA) to deploy"
        required: false
        default: ""

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

jobs:
  # ===========================================================================
  # 1. Quality gate — backend tests + frontend build must pass before shipping
  # ===========================================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-py3.11-${{ hashFiles('requirements.txt', 'requirements-dev.txt') }}
          restore-keys: |
            pip-${{ runner.os }}-py3.11-

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-models-graphcodebert-base-v1

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run backend test suite
        env:
          FLASK_ENV: testing
        run: pytest tests/ -q

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Cache npm download cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-node20-${{ hashFiles('code-sleuth-react-ui/package-lock.json') }}
          restore-keys: |
            npm-${{ runner.os }}-node20-

      - name: Install frontend dependencies
        working-directory: code-sleuth-react-ui
        run: npm ci

      - name: Type check
        working-directory: code-sleuth-react-ui
        run: npx tsc --noEmit

      - name: Frontend unit tests
        working-directory: code-sleuth-react-ui
        run: npm run test

      - name: Build frontend bundle
        working-directory: code-sleuth-react-ui
        run: npm run build

  # ===========================================================================
  # 2. Containerize — build backend + frontend images and push to GHCR
  # ===========================================================================
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute lowercase image base + tag
        id: meta
        run: |
          echo "image_base=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
          # Use the git tag when present, else the short SHA.
          TAG="${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_TYPE}" != "tag" ]; then TAG="sha-${GITHUB_SHA::12}"; fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.backend
          push: true
          tags: |
            ${{ steps.meta.outputs.image_base }}/backend:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_base }}/backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.image_base }}/frontend:${{ steps.meta.outputs.image_tag }}
            ${{ steps.meta.outputs.image_base }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # 3. Migrate & deploy — runs only in the protected `production` environment
  # ===========================================================================
  deploy:
    name: Migrate & Deploy
    runs-on: ubuntu-latest
    needs: build-and-push
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install migration dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply database migrations (alembic upgrade head)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -z "$DATABASE_URL" ]; then
            echo "::error::DATABASE_URL secret is not configured for the production environment."
            exit 1
          fi
          alembic upgrade head

      - name: Trigger production deployment
        env:
          COOLIFY_WEBHOOK_URL: ${{ secrets.COOLIFY_WEBHOOK_URL }}
          COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
        run: |
          if [ -z "$COOLIFY_WEBHOOK_URL" ] || [ -z "$COOLIFY_TOKEN" ]; then
            echo "::error::COOLIFY_WEBHOOK_URL / COOLIFY_TOKEN secrets are not configured."
            echo "Configure them (or replace this step with your host's deploy mechanism) to enable automatic rollout."
            exit 1
          fi
          curl --fail --show-error --silent -X POST \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            "${COOLIFY_WEBHOOK_URL}"

      - name: Deployment summary
        run: |
          echo "### Production deploy dispatched :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image tag: \`${{ needs.build-and-push.outputs.image_tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- Migrations: applied via alembic upgrade head" >> "$GITHUB_STEP_SUMMARY"
