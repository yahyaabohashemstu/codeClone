      type: apiKey
      in: cookie
      name: session
      description: Flask-Login session cookie. Mutating requests also require the X-CSRF-Token header.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
    bearerAuth:
      type: http
      scheme: bearer
  schemas:
