worker_processes auto;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Performance
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    # Must be >= the backend's MAX_CONTENT_LENGTH (backend/config.py = 110 MB),
    # otherwise nginx 413s large uploads the application would have accepted
    # (enterprise scan / spreadsheet archives) before they ever reach Flask.
    client_max_body_size 110m;

    # ---------------------------------------------------------------------------
    # Gzip compression
    # ---------------------------------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        application/wasm
        image/svg+xml
        font/woff2;

    server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html;
        index index.html;

        # -----------------------------------------------------------------------
        # Security headers (aligned with the Flask backend's headers so the
        # origin serves one consistent policy: Flask sets X-Frame-Options DENY)
        # -----------------------------------------------------------------------
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # -----------------------------------------------------------------------
        # Static asset caching
        # -----------------------------------------------------------------------
        location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp|avif|wasm)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # -----------------------------------------------------------------------
        # API proxy: the SPA fetches relative /api/* URLs, so this MUST reach
        # the backend service.  The app is same-origin by construction (no
        # CORS anywhere); without this proxy the SPA fallback below would
        # answer every API call with index.html and the stack is dead.
        # "backend" resolves via the docker-compose service name.
        # -----------------------------------------------------------------------
        location /api/ {
            proxy_pass http://backend:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # -----------------------------------------------------------------------
        # SPA fallback: serve index.html for any route that does not match a
        # real file, so that React Router can handle client-side navigation.
        # -----------------------------------------------------------------------
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Health check endpoint for container orchestrators
        location = /healthz {
            access_log off;
            return 200 "ok\n";
            add_header Content-Type text/plain;
        }
    }
}
