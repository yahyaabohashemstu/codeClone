# =============================================================================
# CodeClone -- Development docker-compose stack
#
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
#
# Browse the app at http://localhost:3000 — Nginx serves the React build and
# proxies /api/* to the backend container (the app is same-origin only).
# Port 5000 is also published for direct API access (curl, CI checks).
#
# NOTE: the source mounts let you edit code without rebuilding the image, but
# Waitress has no auto-reloader — restart the backend container to pick up
# changes (`docker compose restart backend`).
#
# SQLite is used by default (no external database required).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Flask / Waitress backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: codeclone-backend
    ports:
      - "5000:5000"
    volumes:
      # Mount source code so changes are picked up after a container restart.
      - ../wsgi.py:/app/wsgi.py
      - ../backend:/app/backend
      - ../enterprise_platform:/app/enterprise_platform
      - ../enterprise_worker.py:/app/enterprise_worker.py
      - ../enterprise_cli.py:/app/enterprise_cli.py
      - ../templates:/app/templates
      # Persist the SQLite database across container restarts.
      - backend-data:/app/instance
    environment:
      FLASK_ENV: development
      BIND_HOST: "0.0.0.0"
      PORT: "5000"
      SECRET_KEY: "docker-dev-secret-change-in-production"
      WAITRESS_THREADS: "4"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # React / Vite frontend (served by Nginx, /api proxied to the backend)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: codeclone-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
