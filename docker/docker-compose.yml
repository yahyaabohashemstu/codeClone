# =============================================================================
# CodeClone -- Development docker-compose stack
#
# Usage:
#   docker compose -f docker/docker-compose.yml up --build
#
# The backend mounts the source tree for hot-reload during development.
# SQLite is used by default (no external database required).
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Flask / Waitress backend
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: codeclone-backend
    ports:
      - "5000:5000"
    volumes:
      # Mount source code so changes are picked up without a rebuild.
      - ../app.py:/app/app.py
      - ../wsgi.py:/app/wsgi.py
      - ../backend:/app/backend
      - ../enterprise_platform:/app/enterprise_platform
      - ../enterprise_worker.py:/app/enterprise_worker.py
      - ../templates:/app/templates
      - ../static:/app/static
      - ../functions:/app/functions
      # Persist the SQLite database across container restarts.
      - backend-data:/app/instance
      - backend-uploads:/app/uploads
    environment:
      FLASK_ENV: development
      BIND_HOST: "0.0.0.0"
      PORT: "5000"
      SECRET_KEY: "docker-dev-secret-change-in-production"
      WAITRESS_THREADS: "4"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # React / Vite frontend (served by Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: codeclone-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
  backend-uploads:
