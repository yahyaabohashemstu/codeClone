# =============================================================================
# CodeClone -- Production docker-compose stack (STANDALONE)
#
# Usage:
#   docker compose -f docker/docker-compose.prod.yml up -d --build
#
# This file is deliberately self-contained.  It must NOT be layered on top of
# docker-compose.yml: Compose v2 merges service volumes by target path, so the
# old documented two-file invocation silently carried every dev bind-mount
# into "production" and the containers ran host source instead of the image.
#
# Topology: Nginx (:80) serves the React build and proxies /api/* to the
# backend over the internal network.  The backend is NOT published on the
# host — the cookie-authenticated API should only be reachable through Nginx.
#
# TLS: this stack terminates plain HTTP.  SESSION_COOKIE_SECURE is therefore
# explicitly set to "0" below; once you put TLS in front (reverse proxy or a
# certificate on Nginx), REMOVE that override so session cookies are
# Secure-only again.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: codeclone-postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: codeclone
      POSTGRES_USER: codeclone
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeclone -d codeclone"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - codeclone-internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Redis 7 (rate-limiting storage)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: codeclone-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - codeclone-internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Flask / Waitress backend (internal only — reached through the Nginx proxy)
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: codeclone-backend
    # No host port mapping on purpose: keep the cookie-auth API off the host
    # interface; Nginx proxies /api/* to it over codeclone-internal.
    expose:
      - "5000"
    volumes:
      # Persist bootstrap admin credentials / generated key material.
      - backend-instance:/app/instance
    environment:
      FLASK_ENV: production
      BIND_HOST: "0.0.0.0"
      PORT: "5000"
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      WAITRESS_THREADS: "8"
      DATABASE_URL: postgresql://codeclone:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/codeclone
      REDIS_URL: redis://redis:6379/0
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      ENTERPRISE_DATA_KEY: ${ENTERPRISE_DATA_KEY:-}
      # Plain-HTTP stack: see the TLS note at the top of this file.
      SESSION_COOKIE_SECURE: "0"
      # Hand enterprise scan jobs to the dedicated worker below rather than
      # running CPU-heavy scans inside the web process.
      ENTERPRISE_USE_WORKER: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codeclone-internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Enterprise scan worker  (durable background scan processing)
  # ---------------------------------------------------------------------------
  enterprise-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile.backend
    container_name: codeclone-enterprise-worker
    command: ["python", "enterprise_worker.py"]
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      DATABASE_URL: postgresql://codeclone:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/codeclone
      REDIS_URL: redis://redis:6379/0
      MISTRAL_API_KEY: ${MISTRAL_API_KEY:-}
      ENTERPRISE_DATA_KEY: ${ENTERPRISE_DATA_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - codeclone-internal
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # React frontend (Nginx: static SPA + /api reverse proxy — the public entry)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile.frontend
    container_name: codeclone-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - codeclone-internal
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
  backend-instance:

networks:
  codeclone-internal:
    driver: bridge
